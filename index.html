<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarStride Sportswear Information System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body onload="initData()">
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <img src="logo.png" alt="StarStride Logo" class="logo" />
        <div>
          <h1>StarStride Sportswear Information System</h1>
          <p>Interactive Prototype for UC06, UC08, and UC11</p>
        </div>

      <div class="home-button-group">
